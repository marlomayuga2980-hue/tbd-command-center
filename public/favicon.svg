<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E4DB7"/>
      <stop offset="100%" stop-color="#E8743E"/>
    </linearGradient>
  </defs>

  <!-- Antenna stem -->
  <rect x="30" y="3" width="4" height="9" rx="2" fill="#1E4DB7"/>
  <!-- Antenna ball -->
  <circle cx="32" cy="3" r="3.5" fill="#E8743E"/>

  <!-- Head -->
  <rect x="7" y="12" width="50" height="40" rx="11" fill="url(#g1)"/>

  <!-- Face inset -->
  <rect x="12" y="17" width="40" height="30" rx="8" fill="#0c2461" opacity="0.55"/>

  <!-- Left eye socket -->
  <circle cx="22" cy="29" r="7" fill="#1a3a8a" opacity="0.6"/>
  <!-- Left eye glow -->
  <circle cx="22" cy="29" r="5" fill="#38bdf8"/>
  <!-- Left eye pupil -->
  <circle cx="22" cy="29" r="2.5" fill="#ffffff"/>
  <!-- Left eye glint -->
  <circle cx="23.2" cy="27.8" r="1" fill="#bfdbfe"/>

  <!-- Right eye socket -->
  <circle cx="42" cy="29" r="7" fill="#1a3a8a" opacity="0.6"/>
  <!-- Right eye glow -->
  <circle cx="42" cy="29" r="5" fill="#38bdf8"/>
  <!-- Right eye pupil -->
  <circle cx="42" cy="29" r="2.5" fill="#ffffff"/>
  <!-- Right eye glint -->
  <circle cx="43.2" cy="27.8" r="1" fill="#bfdbfe"/>

  <!-- Mouth track -->
  <rect x="18" y="39" width="28" height="5" rx="2.5" fill="#0c2461" opacity="0.5"/>
  <!-- Mouth segments -->
  <rect x="18" y="39" width="8" height="5" rx="2.5" fill="#E8743E"/>
  <rect x="28" y="39" width="6" height="5" rx="1.5" fill="#ffffff" opacity="0.7"/>
  <rect x="36" y="39" width="6" height="5" rx="1.5" fill="#ffffff" opacity="0.4"/>

  <!-- Ear bolts left -->
  <circle cx="7" cy="31" r="4" fill="#1E4DB7" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="7" cy="31" r="1.5" fill="#38bdf8"/>
  <!-- Ear bolts right -->
  <circle cx="57" cy="31" r="4" fill="#1E4DB7" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="57" cy="31" r="1.5" fill="#38bdf8"/>
</svg>
